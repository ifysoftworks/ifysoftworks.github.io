<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | ify softworks</title>
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #ffffff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .container {
            padding: 2rem;
            max-width: 600px;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }

        p {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .email-form {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        input[type="email"] {
            padding: 12px 20px;
            border-radius: 5px;
            border: none;
            outline: none;
            width: 250px;
            font-size: 1rem;
        }

        button {
            padding: 12px 25px;
            border-radius: 5px;
            border: none;
            background-color: #4ecca3;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
            font-size: 1rem;
        }

        button:hover {
            background-color: #45b293;
        }

        .social-links {
            margin-top: 3rem;
        }

        .social-links a {
            color: #94a3b8;
            text-decoration: none;
            margin: 0 10px;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="container">
	<img src="assets/ifysoft_banner.png">
        <h1>Coming Soon</h1>
        <p>We're working hard to bring you something amazing.</p>

    </div>

</body>
</html>
